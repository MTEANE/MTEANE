services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: triggrr
      POSTGRES_PASSWORD: triggrr
      POSTGRES_DB: triggrr
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U triggrr"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://triggrr:triggrr@postgres:5432/triggrr
      REDIS_URL: redis://redis:6379
      PORT: 3000
      NODE_ENV: development
      API_KEY_SECRET: changeme
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
